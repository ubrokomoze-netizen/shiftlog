<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#080d18" />
<title>Night Shift Tracker — 1 Central Complex</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#080d18;color:#dde4f0;font-family:'DM Sans',sans-serif;overscroll-behavior:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#0d1425}::-webkit-scrollbar-thumb{background:#2a3a5c;border-radius:2px}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
textarea,input{font-family:'DM Sans',sans-serif}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
#app{min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0d1a2e,#0a1220);border-bottom:1px solid #1a2d4a;padding:16px 18px 14px;position:sticky;top:0;z-index:10}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start}
.eyebrow{font-family:'DM Mono',monospace;font-size:.58rem;color:#f59e0b;letter-spacing:.22em;text-transform:uppercase;margin-bottom:4px}
.hdr-title{font-size:1.05rem;font-weight:600;color:#fff}
.hdr-date{font-size:.72rem;color:#4a6080;margin-top:3px}
.saving{font-size:.6rem;color:#3a5070;font-family:'DM Mono',monospace}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.saving{animation:pulse 1s infinite}
.prog-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.prog-row{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-lbl{font-family:'DM Mono',monospace;font-size:.62rem;color:#64748b;text-transform:uppercase;letter-spacing:.1em}
.prog-val{font-family:'DM Mono',monospace;font-size:.62rem}
.prog-track{height:4px;background:#1a2d4a;border-radius:2px}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* TABS */
.tabs{display:flex;gap:6px;padding:11px 16px;background:#0a1220;border-bottom:1px solid #1a2d4a;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:7px 14px;border-radius:20px;border:none;white-space:nowrap;font-family:'DM Mono',monospace;font-size:.67rem;letter-spacing:.04em;transition:all .15s}
.tab.on{background:#f59e0b;color:#080d18;font-weight:600}
.tab.off{background:#131f35;color:#7a8fa8}

/* CONTENT */
.content{padding:16px;max-width:640px;width:100%;margin:0 auto;flex:1}

/* SECTION HEADER */
.sec-hdr{margin-bottom:14px}
.sec-lbl{font-family:'DM Mono',monospace;font-size:.65rem;color:#64748b;letter-spacing:.15em;text-transform:uppercase}
.sec-sub{font-size:.74rem;color:#2a4060;margin-top:2px}

/* TASK CARD */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{border-radius:12px;margin-bottom:10px;overflow:hidden;transition:all .2s;border:1px solid;animation:fadeUp .2s ease both}
.card.done{background:#0a1a10;border-color:#1a4d2e}
.card.pend{background:#0f1a2e;border-color:#1a2d4a}
.card-main{display:flex;align-items:flex-start;padding:13px;gap:11px}
.circ{width:34px;height:34px;min-width:34px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;margin-top:1px;flex-shrink:0;background:transparent}
.circ.done{background:#10b981;border-color:#10b981;color:#fff}
.tinfo{flex:1;min-width:0}
.tname{font-size:.88rem;font-weight:500;line-height:1.35}
.tname.done{color:#6ee7b7}
.tname.pend{color:#dde4f0}
.tloc{font-size:.72rem;color:#4a6080;margin-top:2px}
.tmeta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.badge{font-size:.6rem;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px;white-space:nowrap}
.sbadge{font-size:.6rem;color:#4a6080;font-family:'DM Mono',monospace}
.tbadge{font-size:.6rem;color:#10b981;font-family:'DM Mono',monospace}
.cprev{margin-top:8px;font-size:.76rem;color:#7a9ab0;font-style:italic;background:#071410;padding:6px 10px;border-radius:7px;line-height:1.5}
.thumbs{display:flex;gap:6px;margin-top:8px}
.thumb{width:50px;height:50px;object-fit:cover;border-radius:7px;border:1px solid #1a4d2e;cursor:zoom-in}
.xhint{margin-top:6px;font-size:.64rem;color:#2a4060;font-family:'DM Mono',monospace}
.xpanel{border-top:1px solid #1a2d4a;padding:13px 14px 14px;background:#080d18}
.dtxt{font-size:.78rem;color:#7a9ab0;line-height:1.65;margin-top:6px}
.hrow{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #111e30}
.hdate{font-size:.72rem;color:#dde4f0;font-family:'DM Mono',monospace}
.hcmt{font-size:.7rem;color:#4a6080;font-style:italic;margin-top:2px}
.htime{font-size:.62rem;color:#10b981;font-family:'DM Mono',monospace;margin-left:10px;white-space:nowrap}
.minis{display:flex;gap:4px;margin-top:5px}
.mini{width:34px;height:34px;object-fit:cover;border-radius:5px;border:1px solid #1a2d4a;cursor:zoom-in}
.nohist{font-size:.72rem;color:#2a4060;font-family:'DM Mono',monospace}
.sublbl{font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}

/* HISTORY */
.dheader{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.dlbl{font-family:'DM Mono',monospace;font-size:.73rem;color:#f59e0b;font-weight:500}
.ddiv{flex:1;height:1px;background:#1a2d4a}
.dcnt{font-size:.65rem;color:#4a6080}
.hrec{background:#0f1a2e;border:1px solid #1a2d4a;border-radius:10px;padding:12px;margin-bottom:8px}
.hrecname{font-size:.85rem;font-weight:500;color:#dde4f0}
.hrecloc{font-size:.7rem;color:#4a6080;margin-top:1px}
.hreccmt{font-size:.76rem;color:#7a9ab0;font-style:italic;margin-top:5px}
.hrecr{display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-left:10px}
.tpill{font-size:.58rem;padding:2px 7px;border-radius:10px}
.delbtn{background:transparent;border:none;font-size:.9rem;padding:0;color:#3a1a1a}

/* REPORT */
.rpthdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.copybtn{padding:8px 14px;border-radius:8px;font-family:'DM Mono',monospace;font-size:.68rem;transition:all .2s;white-space:nowrap}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.scard{background:#0f1a2e;border-radius:12px;padding:14px;text-align:center}
.sval{font-size:1.5rem;font-weight:700;font-family:'DM Mono',monospace}
.slbl{font-size:.62rem;color:#4a6080;margin-top:3px;text-transform:uppercase;letter-spacing:.1em}
.rrow{background:#080d18;border:1px solid #1a4d2e;border-left:4px solid #10b981;border-radius:9px;padding:11px 12px;margin-bottom:7px}
.prow{background:#0f1a2e;border:1px solid #2a1a1a;border-left:4px solid #ef444455;border-radius:8px;padding:10px 12px;margin-bottom:6px}

/* MODAL */
.movl{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:flex-end}
.mbox{background:#0f1a2e;border-radius:20px 20px 0 0;width:100%;padding:24px 20px 36px;max-height:92vh;overflow-y:auto;border-top:1px solid #1a2d4a}
.meyebrow{font-family:'DM Mono',monospace;font-size:.58rem;color:#f59e0b;letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px}
.mtitle{font-size:1rem;font-weight:600;color:#fff;margin-bottom:4px;line-height:1.3}
.mloc{font-size:.75rem;color:#4a6080;margin-bottom:20px}
.flbl{font-family:'DM Mono',monospace;font-size:.6rem;color:#4a6080;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.pgrid{display:flex;gap:8px;flex-wrap:wrap}
.pthumbw{position:relative}
.pthumb{width:78px;height:78px;object-fit:cover;border-radius:10px;border:1px solid #1a2d4a;display:block}
.pdel{position:absolute;top:-7px;right:-7px;background:#ef4444;border:none;border-radius:50%;width:20px;height:20px;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center}
.padd{width:78px;height:78px;border-radius:10px;border:2px dashed #2a3d5a;background:transparent;color:#4a6080;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.padd-icon{font-size:1.6rem}
.padd-lbl{font-size:.52rem;font-family:'DM Mono',monospace;letter-spacing:.05em}
textarea.cinput{width:100%;min-height:80px;background:#080d18;border:1px solid #1a2d4a;border-radius:12px;padding:12px 14px;color:#dde4f0;font-size:.88rem;resize:vertical;outline:none;line-height:1.5}
.mbtnrow{display:flex;gap:10px;margin-top:22px}
.bcxl{flex:1;padding:14px;border-radius:12px;border:1px solid #1a2d4a;background:transparent;color:#64748b;font-size:.9rem}
.bdone{flex:2;padding:14px;border-radius:12px;border:none;background:#10b981;color:#fff;font-size:.95rem;font-weight:600;transition:background .15s}
.bdone:active{background:#059669}

/* LIGHTBOX */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
.lb img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:8px}
.lbclose{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.15);border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center}

/* CONFIRM */
.covl{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:150;display:flex;align-items:center;justify-content:center;padding:24px}
.cbox{background:#0f1a2e;border:1px solid #2a3d5a;border-radius:16px;padding:24px;max-width:300px;width:100%}
.ctitle{font-size:.95rem;font-weight:600;color:#dde4f0;margin-bottom:8px}
.csub{font-size:.8rem;color:#64748b;margin-bottom:20px}
.cbtns{display:flex;gap:10px}
.bdel{flex:1;padding:12px;border-radius:10px;border:none;background:#ef4444;color:#fff;font-weight:600}
.bcxl2{flex:1;padding:12px;border-radius:10px;border:1px solid #1a2d4a;background:transparent;color:#64748b}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:#2a4060}
.eicon{font-size:2.5rem;margin-bottom:10px}
.elbl{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.1em}
.esub{font-size:.78rem;color:#1a2d4a;margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ════════════════════════════════════════
// DATA
// ════════════════════════════════════════
const DT=[
  {id:"d1", name:"Washroom Cleaning",location:"Tower 1",category:"Washroom",staff:2,
   details:"Waste bins emptied, cleaned & fitted with new liners. Soap dispensers, mirrors, mirror lights, toilet seats (up & down), urinals, hand shower pipes & heads, seat covers thoroughly cleaned. Guest supplies replenished: C-fold tissues, toilet rolls, hand soap. Lift landing areas & corridors maintained. E-gate steel polished; floors swept & mopped. Recyclable & general waste collected from corridors. All office garbage rooms cleaned & washed."},
  {id:"d2", name:"Washroom Cleaning",location:"Tower 2",category:"Washroom",staff:3,
   details:"Full washroom cleaning — bins, dispensers, mirrors, toilets, urinals, hand showers. Guest supplies replenished. Lift landings & corridors maintained."},
  {id:"d3", name:"Washroom Cleaning",location:"Tower 3",category:"Washroom",staff:2,
   details:"Full washroom cleaning — bins, dispensers, mirrors, toilets, urinals, hand showers. Guest supplies replenished. Corridors maintained."},
  {id:"d4", name:"Washroom Cleaning",location:"Tower 4",category:"Washroom",staff:3,
   details:"Full washroom cleaning — bins, dispensers, mirrors, toilets, urinals, hand showers. Guest supplies replenished. Corridors maintained."},
  {id:"d5", name:"Washroom Cleaning",location:"Tower 5",category:"Washroom",staff:2,
   details:"Full washroom cleaning — bins, dispensers, mirrors, toilets, urinals, hand showers. Guest supplies replenished. Corridors maintained."},
  {id:"d6", name:"FM Office Cleaning",location:"Midshift",category:"Midshift",staff:1,
   details:"FM office fully cleaned and maintained."},
  {id:"d7", name:"All Service Elevators — Cleaning & Maintenance",location:"All Areas",category:"Midshift",staff:1,
   details:"All service elevators cleaned and maintained."},
  {id:"d8", name:"Prayer Room Washrooms — Cleaning & Upkeep",location:"Midshift",category:"Midshift",staff:1,
   details:"Prayer room washrooms cleaned and upkept."},
  {id:"d9", name:"Sliding Door Carpets — Vacuuming",location:"All Offices",category:"Midshift",staff:1,
   details:"All office sliding door carpets vacuumed."},
  {id:"d10",name:"Basement Prayer Room Carpets — Vacuuming",location:"Basement",category:"Midshift",staff:1,
   details:"Basement prayer room carpets vacuumed."},
  {id:"d11",name:"Basement Carpark Washing",location:"Basement",category:"Basement",staff:4,
   details:"Heavy-duty scrubber machine (1 staff), high-pressure washer (1 staff), floor wiping & maintenance (2 staff). Full carpark wash."},
  {id:"d12",name:"External Area — Litter & Cleaning",location:"External",category:"External",staff:3,
   details:"All office entrance floors, sitting areas & interlock zones cleared of litter (tissues, plastic, cups, cigarette butts). Marble entrance areas thoroughly washed. Wooden benches cleaned. All external waste bins emptied & sanitized. Dry leaves removed using Makita blowers across all outdoor zones."},
  {id:"d13",name:"Ride-On & Heavy Sweeper Machine Operations",location:"External / Basement",category:"Machine Ops",staff:1,
   details:"XR Machine: GF corridors of all offices. MXR Machine: Lift landing areas, all basements B1–B4 including corridors, lift landings & visitor lifts at B1 & B2. Heavy Sweeper: External service road."},
  {id:"d14",name:"External Area Interlock Floor Scrubbing",location:"All Offices (Office 1–5)",category:"External",staff:4,
   details:"Interlock floor scrubbing daily across all offices, starting from Office 1 through all five offices. Schedule adjusted per operational requirements or handover instructions."},
];
const WT=[
  {id:"w1", name:"Valet Parking Surroundings — Rotary Machine Scrubbing",location:"External",staff:3,frequency:"Weekly"},
  {id:"w2", name:"Deep Floor Scrubbing — Duct Rooms & Fire Exit Areas (GF)",location:"External",staff:2,frequency:"Weekly"},
  {id:"w3", name:"External Plaza Area — All Offices Floor Scrubbing (Single Disc)",location:"External",staff:3,frequency:"2× per week"},
  {id:"w4", name:"All Offices GF to B4 — Staircase Cleaning",location:"External",staff:2,frequency:"2× per week"},
  {id:"w5", name:"B1 Security Staff Pantry, TG Pantry & TG Office — Floor Scrubbing",location:"External",staff:2,frequency:"Weekly"},
  {id:"w6", name:"All Offices GF External — Pillar Cleaning & LV Room Fan Door Grill Cleaning",location:"Basement",staff:2,frequency:"Weekly"},
  {id:"w7", name:"Offices 1, 2, 3, 5 & 25H Hotel — B1 to B4 Footpath Washing",location:"Basement",staff:2,frequency:"2× per week"},
  {id:"w8", name:"Office 1, 3 & 5 — GF External Entrance & Exit Barriers Floor Scrubbing",location:"External",staff:3,frequency:"Weekly"},
  {id:"w9", name:"Office 4 & 5 — GF Corridor Floor Scrubbing (Single Disc)",location:"External",staff:3,frequency:"2× per week"},
  {id:"w10",name:"25H Hotel & Ibis Hotel — Railing Cleaning & Dusting",location:"External",staff:2,frequency:"2× per week"},
  {id:"w11",name:"External Signal Ramp — Office 1 & 2 BOH Security Cabin Interlock Scrubbing",location:"External",staff:3,frequency:"Weekly"},
  {id:"w12",name:"Link Building — Office 4 & 5, B1 & B2 Floor Scrubbing & Sliding Door Cleaning",location:"External",staff:3,frequency:"Weekly"},
];
const CC={Washroom:"#3b82f6",Midshift:"#a855f7",Basement:"#f59e0b",External:"#10b981","Machine Ops":"#ef4444"};

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let S={
  tab:"daily", completions:[], expandedId:null,
  modal:null, comment:"", photos:[],
  lightbox:null, reportDate:todayStr(),
  confirmDel:null, saving:false, copied:false
};

function todayStr(){return new Date().toISOString().slice(0,10)}
function nowStr(){return new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}
function fmtDate(d){return new Date(d+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"})}
function todayFull(){return new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
function esc(s){if(!s)return"";return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function isToday(id,type){return S.completions.some(c=>c.taskId===id&&c.taskType===type&&c.date===todayStr())}
function todayRec(id,type){return S.completions.find(c=>c.taskId===id&&c.taskType===type&&c.date===todayStr())}
function taskHist(id){return S.completions.filter(c=>c.taskId===id).sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time))}

function load(){try{const r=localStorage.getItem("nidr_v2");if(r)S.completions=JSON.parse(r)}catch(_){}}
function save(){try{localStorage.setItem("nidr_v2",JSON.stringify(S.completions))}catch(_){}}

async function compress(file,maxW=1200,q=0.72){
  return new Promise(res=>{
    const rd=new FileReader();
    rd.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const cv=document.createElement("canvas");
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW}
        cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        res(cv.toDataURL("image/jpeg",q));
      };
      img.src=e.target.result;
    };
    rd.readAsDataURL(file);
  });
}

// ════════════════════════════════════════
// RENDER
// ════════════════════════════════════════
function render(){
  document.getElementById("app").innerHTML=buildApp();
  bind();
}

function buildApp(){
  const dd=DT.filter(t=>isToday(t.id,"daily")).length;
  const wd=WT.filter(t=>isToday(t.id,"weekly")).length;
  return`
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="eyebrow">1 Central Complex</div>
      <div class="hdr-title">Night Shift Task Tracker</div>
      <div class="hdr-date">${todayFull()}</div>
    </div>
    ${S.saving?'<div class="saving">saving…</div>':""}
  </div>
  <div class="prog-grid">
    ${pb("Daily",dd,DT.length,"#3b82f6")}
    ${pb("Weekly",wd,WT.length,"#10b981")}
  </div>
</div>
<div class="tabs">
  ${["daily","weekly","history","report"].map(t=>`<button class="tab ${S.tab===t?"on":"off"}" data-tab="${t}">${t==="daily"?"Daily Tasks":t==="weekly"?"Weekly Tasks":t==="history"?"History":"Report"}</button>`).join("")}
</div>
<div class="content">
  ${S.tab==="daily"?buildDaily():""}
  ${S.tab==="weekly"?buildWeekly():""}
  ${S.tab==="history"?buildHistory():""}
  ${S.tab==="report"?buildReport():""}
</div>
${S.modal?buildModal():""}
${S.lightbox?buildLightbox():""}
${S.confirmDel?buildConfirm():""}`;
}

function pb(lbl,done,total,color){
  const pct=total?(done/total*100):0;
  return`<div>
  <div class="prog-row"><span class="prog-lbl">${lbl}</span><span class="prog-val" style="color:${color}">${done}/${total}</span></div>
  <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
</div>`;
}

// ── DAILY ──
function buildDaily(){
  return`<div class="sec-hdr"><div class="sec-lbl">14 Daily Tasks</div><div class="sec-sub">Reset each new shift</div></div>
  ${DT.map((t,i)=>card(t,"daily",CC[t.category]||"#64748b",t.category,i)).join("")}`;
}
// ── WEEKLY ──
function buildWeekly(){
  return`<div class="sec-hdr"><div class="sec-lbl">12 Weekly Tasks</div><div class="sec-sub">Track per-day completion</div></div>
  ${WT.map((t,i)=>card(t,"weekly","#0ea5e9",t.frequency,i)).join("")}`;
}

function card(t,type,color,badge,idx){
  const done=isToday(t.id,type);
  const rec=todayRec(t.id,type);
  const hist=taskHist
